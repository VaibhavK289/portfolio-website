<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="border-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(6, 182, 212, 0.4)" />
      <stop offset="100%" stop-color="rgba(139, 92, 246, 0.3)" />
    </linearGradient>
    <linearGradient id="accent-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
  </defs>
  
  <!-- Main container - full canvas with rounded corners visible -->
  <rect x="0" y="0" width="48" height="48" rx="10" fill="#0a0a0f"/>
  
  <!-- Border gradient - on outer edge -->
  <rect x="0.5" y="0.5" width="47" height="47" rx="9.5" fill="none" stroke="url(#border-gradient)" stroke-width="1"/>
  
  <!-- Inner padding container for proper spacing -->
  <g transform="translate(2, 2)">
    <!-- V Left Arm - original positions maintained -->
    <path d="M7 9 L18 35" stroke="#06b6d4" stroke-width="3.8" stroke-linecap="round" fill="none"/>
    
    <!-- V Right Arm + K Stem (Ligature) -->
    <path d="M18 35 L18 9" stroke="#06b6d4" stroke-width="3.8" stroke-linecap="round" fill="none"/>
    
    <!-- Ink trap at V vertex -->
    <circle cx="18" cy="35" r="1.2" fill="#0a0a0f"/>
    
    <!-- K Upper Diagonal -->
    <path d="M18 22 L31 9" stroke="#06b6d4" stroke-width="3.5" stroke-linecap="round" fill="none"/>
    
    <!-- K Lower Diagonal -->
    <path d="M18 22 L32 35" stroke="#06b6d4" stroke-width="3.5" stroke-linecap="round" fill="none"/>
    
    <!-- K Junction ink trap -->
    <circle cx="18" cy="22" r="0.9" fill="#0a0a0f"/>
    
    <!-- Corner accent -->
    <path d="M36 8 L40 8 L40 12" stroke="url(#accent-gradient)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.55"/>
  </g>
</svg>